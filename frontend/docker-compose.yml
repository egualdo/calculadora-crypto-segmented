version: "3.8"
services:
  frontend:
    image: crypto-calculator-frontend:latest
    container_name: crypto-frontend
    build:
      context: .
      dockerfile: dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-/api}
    networks:
      - crypto-net

networks:
  crypto-net:
    external: true
