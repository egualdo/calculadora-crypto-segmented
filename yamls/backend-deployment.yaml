apiVersion: apps/v1
kind: Deployment
metadata:
  name: crypto-calculator-backend
  namespace: crypto-calculator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crypto-calculator-backend
  template:
    metadata:
      labels:
        app: crypto-calculator-backend
    spec:
      containers:
      - name: crypto-calculator-backend
        image: egualdo/crypto-calculator-backend:latest
        ports:
        - containerPort: 3001
        env:
        - name: DB_HOST
          value: "db"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "crypto_calculator"
        - name: DB_USER
          value: "crypto_user"
        - name: DB_PASSWORD
          value: "crypto_pass"
