apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: crypto-calculator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: "crypto_user"
        - name: POSTGRES_PASSWORD
          value: "crypto_pass"
        - name: POSTGRES_DB
          value: "crypto_calculator"
