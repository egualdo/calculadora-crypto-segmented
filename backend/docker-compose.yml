version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: crypto_postgres
    restart: always
    environment:
      POSTGRES_USER: crypto_user
      POSTGRES_PASSWORD: crypto_pass
      POSTGRES_DB: crypto_calculator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Backend service (opcional, en caso de que quieras correr todo en Docker)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crypto_backend
    restart: always
    depends_on:
      - db
    environment:
      - DB_HOST=localhost
      - DB_PORT=5432
      - DB_NAME=crypto_calculator
      - DB_USER=crypto_user
      - DB_PASSWORD=crypto_pass
    ports:
      - "3001:3001"

volumes:
  postgres_data:
